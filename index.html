<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>跳一跳</title>
</head>
<body>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6f2; /* 粉色背景 */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #ffccdd, #ffb3d9);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .score-board {
            font-size: 40px;
            color: #d63384;
            font-weight: bold;
            text-shadow: 2px 2px 0px #fff;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 230, 242, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }

        h1 {
            color: #d63384;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #fff;
        }

        .char-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .char-btn {
            width: 50px;
            height: 50px;
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .char-btn.selected {
            border-color: #d63384;
            transform: scale(1.1);
        }

        .char-btn:hover {
            transform: scale(1.05);
        }

        button.action-btn {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #a61e61;
            transition: transform 0.1s, box-shadow 0.1s;
            font-weight: bold;
        }

        button.action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #a61e61;
        }

        .hidden {
            display: none !important;
        }

        #game-over-options {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-revive {
            background-color: #20c997;
            box-shadow: 0 4px 0 #0ca678;
        }
        .btn-revive:active {
            box-shadow: 0 0 0 #0ca678;
        }

        .btn-restart {
            background-color: #fcc419;
            box-shadow: 0 4px 0 #e0aa00;
            color: #333;
        }
        .btn-restart:active {
            box-shadow: 0 0 0 #e0aa00;
        }

    </style>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="ui-layer">
            <div class="score-board" id="scoreDisplay">0</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <h1>跳一跳</h1>
            <p style="color: #d63384; margin-bottom: 10px;">选择你的角色:</p>
            <div class="char-selector" id="charSelector">
                <!-- Buttons generated by JS -->
            </div>
            <button class="action-btn" id="startBtn">开始游戏</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="hidden">
            <h1>游戏结束!</h1>
            <p style="font-size: 24px; color: #d63384; margin-bottom: 20px;">得分: <span id="finalScore">0</span></p>
            <div id="game-over-options">
                <button class="action-btn btn-revive" id="reviveBtn">立即复活</button>
                <button class="action-btn btn-restart" id="restartBtn">重开一局</button>
            </div>
        </div>
    </div>

    <script>
        // Game Configuration and State
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreSpan = document.getElementById('finalScore');
        const charSelectorDiv = document.getElementById('charSelector');
        const startBtn = document.getElementById('startBtn');
        const reviveBtn = document.getElementById('reviveBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Character Assets (Using Emojis for simplicity and reliability without external images)
        const characters = [
            { name: '草莓熊', icon: '🧸', color: '#FFC0CB' }, // Using Bear emoji for Lotso vibe
            { name: '哆啦A梦', icon: '😺', color: '#00BFFF' }, // Cat face for Doraemon vibe
            { name: '海绵宝宝', icon: '🧽', color: '#FFFF00' },
            { name: '派大星', icon: '⭐', color: '#FF69B4' },
            { name: '章鱼哥', icon: '🐙', color: '#20B2AA' }
        ];

        let selectedCharIndex = 0;
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        let score = 0;
        let platforms = [];
        let player = {};
        let cameraY = 0;
        let isCharging = false;
        let chargeStartTime = 0;
        let power = 0;
        let animationId;

        // Constants
        const GRAVITY = 0.6;
        const PLATFORM_WIDTH = 70;
        const PLATFORM_HEIGHT = 20;
        const PLAYER_SIZE = 40;

        // Initialize Character Selector
        function initCharacterSelector() {
            charSelectorDiv.innerHTML = '';
            characters.forEach((char, index) => {
                const btn = document.createElement('div');
                btn.className = `char-btn ${index === 0 ? 'selected' : ''}`;
                btn.style.backgroundColor = char.color;
                btn.innerHTML = `<div style="font-size: 24px; line-height: 44px; text-align: center;">${char.icon}</div>`;
                btn.onclick = () => selectCharacter(index);
                charSelectorDiv.appendChild(btn);
            });
        }

        function selectCharacter(index) {
            selectedCharIndex = index;
            const buttons = document.querySelectorAll('.char-btn');
            buttons.forEach((btn, i) => {
                if (i === index) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });
        }

        // Game Logic
        function startGame(isRevive = false) {
            gameState = 'PLAYING';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            if (!isRevive) {
                score = 0;
                platforms = [];
                cameraY = 0;
                generateInitialPlatforms();
            } else {
                // Revive logic: just reset player position on the last platform
                // Keep score and platforms
                const lastPlatform = platforms[platforms.length - 1];
                player.x = lastPlatform.x + lastPlatform.w / 2;
                player.y = lastPlatform.y - PLAYER_SIZE;
                player.vx = 0;
                player.vy = 0;
                player.onGround = true;
            }

            scoreDisplay.innerText = score;
            
            // Reset player state if new game
            if (!isRevive) {
                const startPlatform = platforms[0];
                player = {
                    x: startPlatform.x + startPlatform.w / 2,
                    y: startPlatform.y - PLAYER_SIZE,
                    vx: 0,
                    vy: 0,
                    width: PLAYER_SIZE,
                    height: PLAYER_SIZE,
                    onGround: true,
                    rotation: 0
                };
            }

            if (animationId) cancelAnimationFrame(animationId);
            loop();
        }

        function generateInitialPlatforms() {
            platforms = [];
            let y = canvas.height - 50;
            // Starting platform
            platforms.push({ x: canvas.width / 2 - 50, y: y, w: 100, h: 20 });
            
            for (let i = 0; i < 6; i++) {
                addPlatform(y);
                y -= (100 + Math.random() * 40);
            }
        }

        function addPlatform(lastY) {
            const minGap = 80;
            const maxGap = 140;
            const gap = minGap + Math.random() * (maxGap - minGap);
            const y = lastY - gap;
            
            // Random X within bounds
            const minX = 20;
            const maxX = canvas.width - PLATFORM_WIDTH - 20;
            const x = minX + Math.random() * (maxX - minX);

            platforms.push({ x, y, w: PLATFORM_WIDTH, h: PLATFORM_HEIGHT });
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Charging logic
            if (isCharging) {
                power = Math.min((Date.now() - chargeStartTime) / 1000 * 100, 100);
                if (power >= 100) {
                    // Auto release at max power
                    jump();
                }
            }

            // Physics
            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;

            // Rotation effect during jump
            if (!player.onGround) {
                player.rotation += 0.1;
            } else {
                player.rotation = 0;
            }

            // Collision Detection with Platforms
            player.onGround = false;
            // Only check collision if falling down
            if (player.vy > 0) {
                for (let p of platforms) {
                    if (
                        player.x + player.width/2 > p.x &&
                        player.x - player.width/2 < p.x + p.w &&
                        player.y + player.height/2 > p.y &&
                        player.y + player.height/2 < p.y + p.h + player.vy // Prevent tunneling
                    ) {
                        player.y = p.y - player.height/2;
                        player.vy = 0;
                        player.onGround = true;
                        break;
                    }
                }
            }

            // Camera Scroll
            const targetCameraY = player.y - canvas.height / 2;
            if (targetCameraY < cameraY) {
                cameraY = targetCameraY;
                // Generate new platforms
                const highestPlatform = platforms[platforms.length - 1];
                if (highestPlatform.y > cameraY - 100) {
                    addPlatform(highestPlatform.y);
                }
                // Remove old platforms
                if (platforms[0].y > cameraY + canvas.height + 100) {
                    platforms.shift();
                }
            }

            // Death Condition (Fall off screen)
            if (player.y - cameraY > canvas.height) {
                gameOver();
            }
            
            // Boundary Check (Left/Right)
            if (player.x < 0 || player.x > canvas.width) {
                 // Optional: Wrap around or die? Let's die for classic difficulty
                 // Or bounce? Let's just let them fall for now.
            }
        }

        function draw() {
            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(0, -cameraY);

            // Draw Platforms
            ctx.fillStyle = '#8B4513'; // Brownish base
            platforms.forEach(p => {
                // Pink top
                ctx.fillStyle = '#FF69B4';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                // Shadow/Side
                ctx.fillStyle = '#C71585';
                ctx.fillRect(p.x, p.y + p.h, p.w, 4);
            });

            // Draw Player
            const char = characters[selectedCharIndex];
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.rotation);
            
            // Draw Character Body (Circle)
            ctx.beginPath();
            ctx.arc(0, 0, player.width/2, 0, Math.PI * 2);
            ctx.fillStyle = char.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw Emoji Face
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#000';
            ctx.fillText(char.icon, 0, 2); // Slight offset

            ctx.restore();

            // Draw Charge Bar if charging
            if (isCharging && gameState === 'PLAYING') {
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x - 20, player.y - 30, 40, 6);
                ctx.fillStyle = power > 80 ? '#ff0000' : '#00ff00';
                ctx.fillRect(player.x - 20, player.y - 30, 40 * (power / 100), 6);
            }

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            if (gameState === 'PLAYING') {
                animationId = requestAnimationFrame(loop);
            }
        }

        function jump() {
            if (!player.onGround || !isCharging) return;
            
            isCharging = false;
            // Calculate velocity based on power
            // Max jump force
            const force = 5 + (power / 100) * 12; 
            player.vy = -force;
            
            // Add slight random horizontal movement or aim? 
            // Classic "Tap to jump" usually goes to next platform automatically in some versions,
            // but "Hold to charge" implies distance control. 
            // Let's make it jump slightly towards the nearest platform ahead if possible, 
            // or just straight up with a tiny random X for realism if no input direction.
            // For simple web version: Jump straight up, maybe slight random X.
            player.vx = (Math.random() - 0.5) * 2; 
            
            power = 0;
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            finalScoreSpan.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        function updateScore() {
            // Simple scoring: every time we pass a platform threshold?
            // Better: Count platforms passed.
            // Since platforms are removed, we can track max Y reached.
            // Let's simplify: Score = Number of platforms generated - initial count
            // Actually, let's just increment score when jumping successfully?
            // Standard: Score increases as you go higher.
            const currentLevel = Math.floor((canvas.height - player.y) / 100);
            if (currentLevel > score) {
                score = currentLevel;
                scoreDisplay.innerText = score;
            }
        }
        
        // Override updateScore to be called in loop
        const originalUpdate = update;
        update = function() {
            originalUpdate();
            if(gameState === 'PLAYING') updateScore();
        }

        // Input Handling
        canvas.addEventListener('mousedown', handleInputStart);
        canvas.addEventListener('touchstart', handleInputStart, {passive: false});

        window.addEventListener('mouseup', handleInputEnd);
        window.addEventListener('touchend', handleInputEnd);

        function handleInputStart(e) {
            if (gameState !== 'PLAYING') return;
            e.preventDefault();
            if (player.onGround && !isCharging) {
                isCharging = true;
                chargeStartTime = Date.now();
                power = 0;
            }
        }

        function handleInputEnd(e) {
            if (gameState !== 'PLAYING') return;
            if (isCharging) {
                jump();
            }
        }

        // UI Event Listeners
        startBtn.addEventListener('click', () => startGame(false));
        
        reviveBtn.addEventListener('click', () => {
            startGame(true);
        });

        restartBtn.addEventListener('click', () => {
            startGame(false);
        });

        // Init
        initCharacterSelector();

    </script>
</body>
</html>
