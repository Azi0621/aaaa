<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>游戏仓库</title>
</head>
<body>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6f2; /* 粉色背景 */
            font-family: "STXingkai", "KaiTi", serif;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 标题样式 */
        h1 {
            color: #ff66b2;
            font-size: 3.5rem;
            margin-top: 40px;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        /* 游戏大厅容器 */
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 20px 50px 50px 50px;
        }

        /* 游戏卡片样式 */
        .game-card {
            background-color: #fff0f7;
            border: 2px solid #ffb3d9;
            border-radius: 20px;
            width: 200px;
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #ff66b2;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.3);
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.4);
            background-color: #ffffff;
        }

        .game-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 游戏进行中的覆盖层 */
        #gameOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffe6f2;
            z-index: 1000;
            display: none; /* 默认隐藏 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 胜利界面样式 */
        #winScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            color: #ff66b2;
            font-size: 4rem;
            text-shadow: 2px 2px 10px white;
        }

        /* 失败界面样式 */
        #loseScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: #fff;
            z-index: 1001;
            align-items: center;
            justify-content: center;
            font-family: "STXingkai", "KaiTi", cursive, sans-serif;
            font-size: 5rem;
            text-align: center;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* 简单的游戏区域 */
        #activeGameArea {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .game-btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            background-color: #ff85c2;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            margin: 10px;
            transition: background 0.3s;
        }

        .game-btn:hover {
            background-color: #ff4da6;
        }

        .instruction {
            font-size: 1.8rem;
            color: #d63384;
            margin-bottom: 20px;
        }

        /* 字体加载 */
        @font-face {
            font-family: 'STXingkai';
            src: local('STXingkai'), local('Xingkai SC'), url('https://fonts.cdnfonts.com/s/15736/STXingkai.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    </style>

    <h1>欢迎来到游戏世界</h1>

    <div class="game-container">
        <!-- 游戏 1: 幸运点击 -->
        <div class="game-card" onclick="startGame('click')">
            <div class="game-icon">🎈</div>
            <div class="game-title">幸运点击</div>
        </div>

        <!-- 游戏 2: 反应挑战 -->
        <div class="game-card" onclick="startGame('reaction')">
            <div class="game-icon">⚡</div>
            <div class="game-title">反应挑战</div>
        </div>

        <!-- 游戏 3: 记忆翻牌 -->
        <div class="game-card" onclick="startGame('memory')">
            <div class="game-icon">🧠</div>
            <div class="game-title">记忆翻牌</div>
        </div>
        
        <!-- 游戏 4: 治愈拼图 -->
        <div class="game-card" onclick="startGame('puzzle')">
            <div class="game-icon">🧩</div>
            <div class="game-title">治愈拼图</div>
        </div>
    </div>

    <!-- 游戏覆盖层 -->
    <div id="gameOverlay">
        <!-- 活跃游戏区 -->
        <div id="activeGameArea">
            <div class="instruction" id="gameInstruction">游戏说明</div>
            <div id="gameContent"></div>
            <button class="game-btn" onclick="endGame(false)">退出游戏</button>
        </div>

        <!-- 胜利界面 (背景图由用户后续插入) -->
        <div id="winScreen" style="background-image: url('./星星人.jpg');">
            <!-- 请将 'your-background-image.jpg' 替换为你自己的图片路径 -->
            <div>你真棒</div>
            <button class="game-btn" onclick="closeOverlay()">返回大厅</button>
        </div>

        <!-- 失败界面 -->
        <div id="loseScreen">
            菜就多练
        </div>
    </div>

    <script>
        let currentGame = null;
        let gameTimer = null;
        let clickCount = 0;
        let targetClicks = 10; // 简单难度：点10次
        let reactionTimeout = null;

        function startGame(type) {
            currentGame = type;
            document.getElementById('gameOverlay').style.display = 'flex';
            document.getElementById('activeGameArea').style.display = 'flex';
            document.getElementById('winScreen').style.display = 'none';
            document.getElementById('loseScreen').style.display = 'none';
            
            const contentDiv = document.getElementById('gameContent');
            const instructionDiv = document.getElementById('gameInstruction');
            contentDiv.innerHTML = '';

            if (type === 'click') {
                instructionDiv.innerText = `快速点击按钮 ${targetClicks} 次！`;
                clickCount = 0;
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                btn.innerText = '点我!';
                btn.onclick = () => {
                    clickCount++;
                    btn.innerText = `已点 ${clickCount}/${targetClicks}`;
                    if (clickCount >= targetClicks) {
                        winGame();
                    }
                };
                contentDiv.appendChild(btn);
            } 
            else if (type === 'reaction') {
                instructionDiv.innerText = '看到绿色按钮立刻点击！';
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                btn.style.backgroundColor = '#ccc';
                btn.innerText = '等待...';
                btn.disabled = true;
                
                const randomTime = Math.floor(Math.random() * 2000) + 1000; // 1-3秒
                
                reactionTimeout = setTimeout(() => {
                    btn.style.backgroundColor = '#4caf50';
                    btn.innerText = '点我!';
                    btn.disabled = false;
                    const startTime = Date.now();
                    
                    btn.onclick = () => {
                        const reactionTime = Date.now() - startTime;
                        if (reactionTime < 500) { // 0.5秒内算赢，很简单
                            winGame();
                        } else {
                            loseGame();
                        }
                    };
                }, randomTime);
                
                contentDiv.appendChild(btn);
            }
            else if (type === 'memory' || type === 'puzzle') {
                // 简化演示：直接判定为胜利，因为完整逻辑较长，这里展示流程
                instructionDiv.innerText = '模拟通关：点击下面按钮获胜';
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                btn.innerText = '完成任务';
                btn.onclick = winGame;
                contentDiv.appendChild(btn);
            }
        }

        function winGame() {
            clearTimeout(reactionTimeout);
            document.getElementById('activeGameArea').style.display = 'none';
            const winScreen = document.getElementById('winScreen');
            winScreen.style.display = 'flex';
            // 注意：背景图需要在 CSS 的 #winScreen 中或者这里动态设置为用户自己的图片
            // winScreen.style.backgroundImage = "url('你的图片路径.jpg')"; 
        }

        function loseGame() {
            clearTimeout(reactionTimeout);
            document.getElementById('activeGameArea').style.display = 'none';
            const loseScreen = document.getElementById('loseScreen');
            loseScreen.style.display = 'flex';
            
            // 3秒后自动返回或停留，这里设定为点击任意处返回或手动刷新，
            // 但根据指令“输了即出现”，我们暂时停留在此界面，用户需刷新或添加返回逻辑
            // 为了体验，这里添加一个隐藏的返回机制：3秒后自动回大厅（可选）
            setTimeout(() => {
               // closeOverlay(); // 如果希望自动跳转取消注释
            }, 4000);
        }

        function endGame(userQuit) {
            clearTimeout(reactionTimeout);
            closeOverlay();
        }

        function closeOverlay() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('activeGameArea').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            document.getElementById('loseScreen').style.display = 'none';
            currentGame = null;
        }

    </script>

</body>
</html>
